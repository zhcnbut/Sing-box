name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'RELEASE_NOTES.md'
      - '.github/workflows/release.yml'
  workflow_dispatch: # 手动触发按钮

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version
        id: get_version
        run: |
          # 放宽正则容错率，并加入 || echo "" 防止 grep 找不到时直接崩溃
          VERSION=$(grep -oP 'is_sh_ver="\K[^"]+' src/init.sh | head -n 1 || echo "")
          
          if [ -z "$VERSION" ]; then
            echo "❌ 致命错误：无法在 src/init.sh 中找到 is_sh_ver 变量！请检查拼写。"
            exit 1
          fi
          
          echo "成功提取到版本号: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi
          echo "TAG_EXISTS=$TAG_EXISTS" >> $GITHUB_ENV

      - name: Check if Release is Needed
        id: check_release
        run: |
          if [ "${{ env.TAG_EXISTS }}" = "true" ]; then
            echo "版本 ${{ env.VERSION }} 已存在，无需发布新 Release。自动跳过。"
            echo "should_release=false" >> $GITHUB_ENV
          else
            echo "检测到新版本: ${{ env.VERSION }}。准备自动发布！"
            echo "should_release=true" >> $GITHUB_ENV
          fi

      - name: Extract Release Notes
        if: env.should_release == 'true'
        run: |
          NOTES_FILE="RELEASE_NOTES.md"
          OUTPUT_FILE="${RUNNER_TEMP}/release-notes-${VERSION}.md"

          if [ ! -f "$NOTES_FILE" ]; then
            echo "❌ 缺少 $NOTES_FILE，无法生成 Release 描述。"
            exit 1
          fi

          awk -v version="$VERSION" '
            $0 == "## " version { in_version=1; next }
            in_version && /^## / { exit }
            in_version && /^### / && !in_section { in_section=1; print; next }
            in_section && /^### / { exit }
            in_section { print }
          ' "$NOTES_FILE" > "$OUTPUT_FILE"

          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "❌ $NOTES_FILE 中没有找到 $VERSION 的主要变化说明。"
            exit 1
          fi

          echo "RELEASE_BODY=$OUTPUT_FILE" >> "$GITHUB_ENV"

      - name: Package Code
        if: env.should_release == 'true'
        # 将压缩包先生成在上一层目录，彻底避开“文件正在变化”的冲突，然后再移回来
        run: |
          tar --exclude=".git" --exclude=".github" -zcvf ../code.tar.gz .
          mv ../code.tar.gz ./

      - name: Create Release
        if: env.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: code.tar.gz
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: ${{ env.RELEASE_BODY }}
